
<h2 class="sr-only">Password Strength Analyzer tool for evaluating password security</h2>
<div style="max-width: 560px; margin: 0 auto; padding: 1.5rem 0;">

  <div style="background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.5rem;">

    <p style="font-size: 13px; color: var(--color-text-secondary); margin: 0 0 1.25rem;">Enter a password to evaluate its strength and get suggestions.</p>

    <div style="position: relative; margin-bottom: 1rem;">
      <input type="password" id="pwInput" placeholder="Type your password here..." oninput="analyze()" style="width: 100%; box-sizing: border-box; padding-right: 44px;" />
      <button onclick="toggleVis()" id="eyeBtn" aria-label="Toggle password visibility" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--color-text-secondary); padding: 4px;">
        <i class="ti ti-eye" id="eyeIcon" style="font-size: 18px;" aria-hidden="true"></i>
      </button>
    </div>

    <div style="height: 6px; background: var(--color-background-secondary); border-radius: 4px; margin-bottom: 0.5rem; overflow: hidden;">
      <div id="bar" style="height: 100%; width: 0%; border-radius: 4px; transition: width 0.3s, background 0.3s;"></div>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem;">
      <span id="scoreLabel" style="font-size: 13px; font-weight: 500; color: var(--color-text-secondary);">—</span>
      <span id="scoreNum" style="font-size: 13px; color: var(--color-text-tertiary);"></span>
    </div>

    <div id="checks" style="display: flex; flex-direction: column; gap: 6px; margin-bottom: 1.25rem;"></div>

    <div id="suggBox" style="display: none; background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.75rem 1rem;">
      <p style="font-size: 12px; font-weight: 500; color: var(--color-text-secondary); margin: 0 0 6px; text-transform: uppercase; letter-spacing: 0.05em;">Suggestions</p>
      <ul id="suggList" style="margin: 0; padding-left: 1.25rem; font-size: 13px; color: var(--color-text-secondary); line-height: 1.8;"></ul>
    </div>
  </div>

  <div style="margin-top: 1rem; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem;">
    <p style="font-size: 13px; font-weight: 500; margin: 0 0 0.75rem; color: var(--color-text-primary);">Generate a strong alternative</p>
    <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
      <label style="font-size: 13px; color: var(--color-text-secondary);">Length</label>
      <input type="range" id="genLen" min="8" max="32" value="16" step="1" oninput="document.getElementById('lenOut').textContent=this.value" style="flex:1; min-width: 100px;" />
      <span id="lenOut" style="font-size: 13px; font-weight: 500; min-width: 20px;">16</span>
      <button onclick="generatePw()" style="padding: 6px 14px; font-size: 13px;">Generate</button>
    </div>
    <div id="genOut" style="display:none; margin-top: 0.75rem; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
      <code id="genPw" style="font-family: var(--font-mono); font-size: 13px; background: var(--color-background-secondary); padding: 6px 10px; border-radius: var(--border-radius-md); flex: 1; word-break: break-all; color: var(--color-text-primary);"></code>
      <button onclick="copyPw()" id="copyBtn" aria-label="Copy generated password" style="padding: 6px 12px; font-size: 13px;"><i class="ti ti-copy" aria-hidden="true"></i> Copy</button>
    </div>
  </div>

  <p style="font-size: 11px; color: var(--color-text-tertiary); text-align: center; margin-top: 0.75rem;">Passwords are never sent anywhere — all analysis runs locally in your browser.</p>
</div>

<style>
#genOut { display: none; }
</style>

<script>
const rules = [
  { id:'len',   label:'At least 8 characters',            test: p => p.length >= 8 },
  { id:'len12', label:'12+ characters (recommended)',     test: p => p.length >= 12 },
  { id:'upper', label:'Uppercase letter (A–Z)',           test: p => /[A-Z]/.test(p) },
  { id:'lower', label:'Lowercase letter (a–z)',           test: p => /[a-z]/.test(p) },
  { id:'digit', label:'Number (0–9)',                     test: p => /\d/.test(p) },
  { id:'sym',   label:'Special character (!@#$…)',        test: p => /[^A-Za-z0-9]/.test(p) },
];

const commonPatterns = ['password','123456','qwerty','abc123','letmein','admin','welcome','monkey','dragon'];

function analyze() {
  const pw = document.getElementById('pwInput').value;
  const checks = document.getElementById('checks');
  checks.innerHTML = '';

  let passed = 0;
  const suggestions = [];

  rules.forEach(r => {
    const ok = pw.length > 0 && r.test(pw);
    if (ok) passed++;
    if (pw.length > 0) {
      const div = document.createElement('div');
      div.style.cssText = 'display:flex;align-items:center;gap:8px;font-size:13px;';
      div.innerHTML = `<i class="ti ${ok ? 'ti-circle-check' : 'ti-circle-x'}" style="font-size:16px;color:${ok ? 'var(--color-text-success)' : 'var(--color-text-secondary)'}" aria-hidden="true"></i><span style="color:${ok ? 'var(--color-text-primary)' : 'var(--color-text-secondary)'}">${r.label}</span>`;
      checks.appendChild(div);
      if (!ok) suggestions.push(r.label);
    }
  });

  const isCommon = commonPatterns.some(p => pw.toLowerCase().includes(p));
  if (isCommon && pw.length > 0) {
    suggestions.unshift('Avoid common words or patterns like "password" or "123456"');
    passed = Math.max(0, passed - 2);
  }

  const pct = pw.length === 0 ? 0 : Math.round((passed / rules.length) * 100);
  const bar = document.getElementById('bar');
  const label = document.getElementById('scoreLabel');
  const num = document.getElementById('scoreNum');

  let color, text;
  if (pw.length === 0) { color = 'transparent'; text = '—'; }
  else if (pct <= 33)  { color = '#E24B4A'; text = 'Weak'; }
  else if (pct <= 66)  { color = '#EF9F27'; text = 'Moderate'; }
  else if (pct <= 83)  { color = '#639922'; text = 'Strong'; }
  else                  { color = '#1D9E75'; text = 'Very strong'; }

  bar.style.width = pct + '%';
  bar.style.background = color;
  label.textContent = text;
  label.style.color = pw.length === 0 ? 'var(--color-text-secondary)' : color;
  num.textContent = pw.length > 0 ? `${passed}/${rules.length} checks passed` : '';

  const suggBox = document.getElementById('suggBox');
  const suggList = document.getElementById('suggList');
  if (suggestions.length > 0 && pw.length > 0) {
    suggList.innerHTML = suggestions.map(s => `<li>${s}</li>`).join('');
    suggBox.style.display = 'block';
  } else {
    suggBox.style.display = 'none';
  }
}

function toggleVis() {
  const inp = document.getElementById('pwInput');
  const icon = document.getElementById('eyeIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.className = 'ti ti-eye-off';
  } else {
    inp.type = 'password';
    icon.className = 'ti ti-eye';
  }
}

function generatePw() {
  const len = parseInt(document.getElementById('genLen').value);
  const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()-_=+[]{}';
  let pw = '';
  const arr = new Uint32Array(len);
  crypto.getRandomValues(arr);
  for (let i = 0; i < len; i++) pw += chars[arr[i] % chars.length];
  document.getElementById('genPw').textContent = pw;
  document.getElementById('genOut').style.display = 'flex';
  document.getElementById('copyBtn').textContent = '';
  document.getElementById('copyBtn').innerHTML = '<i class="ti ti-copy" aria-hidden="true"></i> Copy';
}

function copyPw() {
  const pw = document.getElementById('genPw').textContent;
  navigator.clipboard.writeText(pw).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i> Copied';
    setTimeout(() => { btn.innerHTML = '<i class="ti ti-copy" aria-hidden="true"></i> Copy'; }, 2000);
  });
}
</script>
